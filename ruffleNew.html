<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Ruffle player</title>
</head>
<body style="margin:0px;">
<div id="container"></div> <script>
var swfFile = window.location.search.replace( '?', ''); ;
      window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
						"autoplay": "on",
						"contextMenu": "off",
						"showSwfDownload": true,
						"menu": false,
						"quality": "medium",
						"openUrlMode": "deny",
                        "warnOnUnsupportedContent": false,
                        "maxExecutionDuration": 60,
                        "base": null,
                        "forceScale": false,
                        "allowScriptAccess": false
};
            document.addEventListener("DOMContentLoaded", function () {
              var swfFile = window.location.search.replace( '?', ''); ;
                let swf = swfFile;
                if (swf) {
                    let ruffle = window.RufflePlayer.newest();
                    let player = Object.assign(document.getElementById("container").appendChild(ruffle.createPlayer()), {
                        style: 'width: 100vw; height: 100vh',
                    });

                    player.load({
                        url: swf,
                        parameters: ""
                    });
                }
            });
        </script>
<script src="https://unpkg.com/@ruffle-rs/ruffle@^0.4.0-nightly"></script>
</body>
</html>
